name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check commit name
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Check formatting
        run: npm run format:check
        if: always()

      - name: Lint code
        run: npm run lint
        if: always()

      - name: Check types
        run: npm run types:check
        if: always()

      - name: Build
        run: npm run build-keycloak-theme
        if: always()

  java-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven packages
        uses: actions/cache@v6
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and test USOS provider
        working-directory: keycloak-usos-provider
        run: |
          echo "Building USOS OAuth 1.0a provider..."
          mvn clean compile
          echo "Running comprehensive tests..."
          mvn test
          echo "Running static analysis..."
          mvn checkstyle:check
          mvn spotbugs:check
          mvn pmd:check
          echo "Building final JAR..."
          mvn package

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: java-test-results
          path: |
            keycloak-usos-provider/target/surefire-reports/
            keycloak-usos-provider/target/checkstyle-result.xml
            keycloak-usos-provider/target/spotbugsXml.xml
            keycloak-usos-provider/target/pmd.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        if: always()
        with:
          file: keycloak-usos-provider/target/site/jacoco/jacoco.xml
          flags: java
